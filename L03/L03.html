## RSA baseline

<div class="content-center">

**RSA** is an asymmetric cryptographic algorithm based on the ***integer factorization problem***.

What we would like to have in principle:

<br/>


<div class="fragment" data-fragment-index="1">

1. $(n, e)$ will be the public key, i.e., $k_{public} = (n, e)$

<br>

2. $(n, d)$ will be the private key, i.e., $k_{private} = (n, d)$

</div>



</div>

---

## RSA Key Generation

<div class="content-center">

1. Choose two large prime numbers $p$ and $q$

<br/>


<div class="fragment" data-fragment-index="1">

2. Compute their product: $n = p \\cdot q$

<br/>


</div>

<div class="fragment" data-fragment-index="2">

3. Compute the totient: $\\Phi(n) = (p-1)(q-1)$

<br/>
<br/>


</div>

<div class="fragment" data-fragment-index="3">

4. Choose an integer $e$ such that:
    - must be prime
    - must be smaller than $\\Phi(n)$, i.e., $1 < e < \\phi(n)$ 
    - must not be a factor of $\\Phi(n)$, i.e., must be coprime to $\\phi(n)$
    - in practice:
        - we can use the Euclidean Algorithm to test if $e$ is coprime to $\\phi(n)$
        - most implementations use $e = 65537$ (after checking $\\Phi(n)$ isn't divisible by 65537)

<br/>


</div>

<div class="fragment" data-fragment-index="4">

5. Choose an integer $d$ such that:
    - The product $e \\cdot d$ divided by $\\Phi(n)$ has a remainder of 1, i.e., $d$ is  modular inverse of $e$ modulo $\\phi(n)$: $d \\equiv e^{-1} \\bmod \\phi(n)$
    - in practice: we can use the Extended Euclidean algorithm to compute $d$

</div>



</div>

# RSA: Core Functionality

---

## RSA: Encryption

<div class="content-center">

The encryption function is defined as:

$$
    y = E_{k_{public}}(x) = x^e \\mod n
$$

where $x$ is the message, $y$ is the ciphertext, (e, n) is the public key of the person <u>receiving</u> the message. Indeed, only the person with the private key $(d, n)$ can decrypt the message.

<br/>
<br/>


<div class="fragment" data-fragment-index="1">

<div class="alert alert-hint"><b>WARNING</b>:  As it must be, RSA uses the public key of the receiver to encrypt the message!</div>

</div>



</div>

---

## RSA Decryption

<div class="content-center">

The decryption function is defined as:

$$
    x = D_{k_{private}}(y) = y^d = (x^{e})^d = x^{ed} = x^{1} = x \\mod n
$$

<br/>


<div class="fragment" data-fragment-index="1">

where $x$ is the message, $y$ is the ciphertext, (d, n) is the private key of the person <u>receiving</u> the message.

<div class="alert alert-warning"><b>WARNING</b>: As it must be, RSA uses the private key of the receiver to decrypt the message.</div>

</div>



</div>

---

## RSA in Python

<div class="content-center">

We perform now encryption and decryption:

```python
# input message
x = 60
print("The input message is:", x)

# encryption
y = x ** e % n
print("The encrypted message is:", y)

# decryption
z = y ** d % n
print("The decrypted message is:", z)

# this must be true!
assert x == z
```



</div>

## Converting strings to numbers and vice versa

<div class="content-center">

RSA works with numbers but usually messages are text. Use this code to convert from number to string.

<br/>


<div class="fragment" data-fragment-index="1">

```python
# m is the decrypted message

byte_len = (m.bit_length() + 7) // 8
flag = m.to_bytes(byte_len, 'big').decode('utf-8')

# flag is a string
```

<br/>


</div>

<div class="fragment" data-fragment-index="2">

```python
# message is the string

data = message.encode('utf-8')
numeric_message = int.from_bytes(data, 'big')

# numeric_message is the number
```

<br/>


</div>

# Satcom Intercept

<div class="content-center">

Crypto Challenge 11

---

## Satcom Intercept - Reconnaissance

<div class="content-center">

<div class="cell-center">

<img src="./img/Screenshot_3.png" style="height: 400px;" />

</div>

<br/>


What can we observe?
- There was a transmission that was repeted $5$ times, one for each satellite.
- The encryption was done all with the **same exponent**.
- All the transmission used different **moduli**.
- The exponent used is $5$.



</div>

---

## Satcom Intercept - Hypothesis

<div class="content-center">

The same plaintext is encrypted using RSA with a low public exponent across different moduli:

$$
c_i = m^e \\bmod n_i
$$

If the same message is encrypted at least $e$ times using:
- A small exponent,
- Different moduli,
- No padding,

the ciphertexts can be combined using the Chinese Remainder Theorem to recover:

$$
m^e
$$

over the integers.

<div class="fragment" data-fragment-index="1">

<div class="alert alert-hint">The low $e$ with the same plaintext encrypted at least $e$ times can be used to recover the encryption parameters.</div>

</div>
