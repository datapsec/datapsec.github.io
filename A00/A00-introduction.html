## Course Goals

<div class="content-center">

The course provides essential knowledge in data privacy and cybersecurity, blending theoretical concepts with practical skills:

- **Cryptography**: symmetric ciphers, asymmetric ciphers, hashing and digital signatures.
- **Authentication**: passwords, MFA, certificates.
- **Anonymous communication**: TOR and the dark web.
- **Blockchain technologies**: fundamentals and smart contracts.
- **Software vulnerabilities**: CWE, Zero day vs n-day, CVE, CVSS, OWASP Top 10.
- **Web security**: server- and client-side vulnerabilities.
- **Regulations**: Cybersecurity Act and GDPR.



</div>

## Attending students: hands-on sessions (33% of the final score)

<div class="content-center">

During the lectures, we will solve **together** some challenges:

- each **challenge** is a cybersecurity task that you have to solve
- it is inspired by a real-world scenario but with simplified conditions
- when you solve a challenge, you get a **flag** that certifies your achievement
- you have to submit the flag to our **Capture-The-Flag platform** to prove the task solution

The score is computed as the percentage of the challenges you have solved.



</div>

## Capture The Flag?

<div class="content-center">

Our practical session are organized as a **Capture The Flag (CTF) competition**. 

A Capture the Flag (CTF) is a computer security competition. CTF contests are usually designed to serve as an educational exercise to give participants hands-on experience in the sort of attacks and protections found in the real world. There are two main styles of capture the flag competitions: jeopardy - like this competition - and attack/defense.

Jeopardy-style competitions usually involve multiple categories of problems, each of which contains a variety of questions that range from easy to more difficult ones. Teams or individuals attempt to earn the most points in the competition's time frame, but do not directly attack each other. CTFs often touch many aspects of information security, like cryptography, steganography, binary analysis and exploitation, reverse engeneering, web security, mobile security and others. This competition will be focused on email security and web security (client and server-side).



</div>

## Attending students: project (33% of the final score)

<div class="content-center">

The project:

- involves the study of **one** real-world vulnerability

- is submitted as **one** 15 pages report:
    - description of the affected program
    - description of the vulnerability type
    - description of the vulnerability
    - exploitation of the vulnerability
    - mitigation of the vulnerability
    - [optional, only for higher score] reproduction and fix of the vulnerability in a docker container
    
- is evaluated based on a 0-30 points scale:
    - 25 points for the report
    - 5 points for reproduction environment



</div>

---

## Non-attending students: project (66% of the final score)

<div class="content-center">

The project:

- involves the study of **two** real-world vulnerabilities

- is submitted as **two** 15 pages report:
    - description of the affected program
    - description of the vulnerability type
    - description of the vulnerability
    - exploitation of the vulnerability
    - mitigation of the vulnerability
    - reproduction and fix of the vulnerability in a docker container

- is evaluated based on 0-30 points scale:
    - 20 points for the reports
    - 10 points for reproduction environment

- **Reproduction environment is required!**



</div>
