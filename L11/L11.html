## What is Nmap?

<div class="content-center">

<div class="cell-center">

<img src="https://upload.wikimedia.org/wikipedia/commons/7/73/Logo_nmap.png" style="width: 100%;">

</div>

<br/>


<div class="fragment" data-fragment-index="0">

**Nmap (Network Mapper)** is an open-source tool used for:

- Network discovery
- Port scanning
- Service detection
- OS fingerprinting

</div>



</div>

---

## What Can Nmap Do?

<div class="content-center">

- Discover live hosts
- Identify open ports
- Detect running services
- Guess operating systems
- Run scripts (NSE)



</div>

---

## Basic Scan

<div class="content-center">

```bash
nmap scanme.nmap.org
```

<div class="fragment" data-fragment-index="1">

```bash

Not shown: 987 closed tcp ports (conn-refused)

```

</div>



</div>

## Service Detection

<div class="content-center">

```bash
nmap -sV scanme.nmap.org
```

</div>



</div>

---

## What Nmap Does NOT Do Well

<div class="content-center">

- No full vulnerability correlation

- Limited automation

- Requires manual analysis

<div class="fragment" data-fragment-index="1">

<div class="alert alert-hint">Does OpenSSH 10.0p2 Debian has any vulnerabilities?</div>

</div>

<div class="fragment" data-fragment-index="2">

<div class="alert alert-hint">Does dnsmasq 2.92test21 has vulnerabilities?</div>

</div>

<div class="fragment" data-fragment-index="3">

But the real question is...

</div>

<div class="fragment" data-fragment-index="4">

<div class="alert alert-warning">Is this host vulnerable?</div>

</div>



</div>

---

## Enter Vulnerability Scanners

<div class="content-center">

Tools that go beyond Nmap and automatically do:

- Automated vulnerability detection
- Risk scoring
- Reporting dashboards

<div class="fragment" data-fragment-index="1">

Commercial Tools:
- Nessus
- Qualys
- Rapid7 InsightVM
- Intruder

</div>

<div class="fragment" data-fragment-index="2">

<div class="alert alert-hint">Or Open Source tools: OpenVAS</div>

</div>



</div>

---

## What These Tools Do

<div class="content-center">

1. Detect services (like Nmap)
2. Match them to vulnerabilities
3. Assign severity scores



</div>

---

<!-- .slide: data-state="break-blue hide-controls" -->

# CVE (Common Vulnerabilities and Exposures)

---

## CVE

<div class="content-center">

- Standardized vulnerability IDs
- Example: CVE-2024-12345
- The vulnerabilities are all public!

Managed by MITRE



</div>

---

## CVSS (Scoring System)

<div class="content-center">

| Score | Severity |
| ----- | -------- |
| 0–3   | Low      |
| 4–6   | Medium   |
| 7–8   | High     |
| 9–10  | Critical |



</div>

---

## Zero-Day vs N-Day

<div class="content-center">

<div class="fragment" data-fragment-index="1">

Zero-day

- Unknown vulnerability
- No patch available

</div>

<div class="fragment" data-fragment-index="2">

N-day

- Known vulnerability
- Patch exists

</div>



</div>

---

<!-- .slide: data-state="break-blue hide-controls" -->

# Internet-Wide Scanning

---

## Platforms

<div class="content-center">

Some platforms scan the entire Internet continuously:

- Shodan
- Censys
- ZoomEye



</div>

---

## What They Index

<div class="content-center">

- Open ports
- Services
- Banners
- Devices

<div class="fragment" data-fragment-index="1">

<div class="alert alert-warning">If it is exposed to the Internet, it will be found</div>

</div>



</div>

---

## Common Risks

<div class="content-center">

- Misconfigured services
- Default credentials
- Unpatched systems
- Shadow IT
