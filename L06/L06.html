## Docker baseline

<div class="content-center">

**Docker** is a container platform that allows developers to package applications and their dependencies into lightweight, portable environments that can run consistently across different systems.

<br/>




</div>

---

## Main Docker concepts

<div class="content-center">

<div class="fragment" data-fragment-index="1">

- **Docker Image**: A read-only template with instructions for creating a container (like a recipe)
- **Docker Container**: A running instance of an image (like the dish)
- **Dockerfile**: A text file with instructions to build an image
- **Docker Hub**: A public registry for sharing images

<br/>


</div>



</div>

---

## How Docker Works

<div class="content-center">

<div class="cell-center">

<img src="../N01/img/docker-basics-of-docker-system.png" style="width: 80%;">

</div>

<br/>


<div class="fragment" data-fragment-index="0">

1. A **Dockerfile** describes how to build an image
2. `docker build` creates the image from the Dockerfile
3. `docker push` uploads the image to a **registry** (e.g., Docker Hub)
4. On another machine: `docker pull` downloads the image
5. `docker run` starts a container from the image

</div>



</div>

---

## Copying Files: `docker cp`

<div class="content-center">

<div class="fragment" data-fragment-index="1">

`docker cp` copies files between the host and a container:

```bash
# Copy a file FROM the container TO the host
docker cp my-web:/etc/nginx/nginx.conf ./nginx.conf

# Copy a file FROM the host TO the container
docker cp ./index.html my-web:/usr/share/nginx/html/
```

<br/>


</div>

<div class="fragment" data-fragment-index="2">

This is useful for:
- Extracting logs, data, or configuration files from a container
- Injecting configuration or data files into a running container
- Debugging: inspecting files inside a container without `exec`

</div>



</div>
