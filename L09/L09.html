## Metamask

<div class="content-center">

<div class="cell-center">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/MetaMask_Fox.svg/960px-MetaMask_Fox.svg.png" style="width: 40%;">

</div>

<br/>


<div class="fragment" data-fragment-index="0">

- **MetaMask** is a **crypto wallet and browser extension/mobile app** that lets users store, send, and receive cryptocurrencies and NFTs.
- It connects users to **blockchain networks** like Ethereum, enabling interaction with decentralized applications.
- MetaMask manages **private keys locally on the user’s device**, giving users full control over their digital assets instead of relying on a centralized service.
- It allows users to **swap tokens, manage multiple accounts, and access Web3 platforms** such as decentralized finance apps and NFT marketplaces.

</div>



</div>

## Install Metamask

<div class="content-center">

<div class="fragment" data-fragment-index="1">

Use a modern and secure web browser such as Google Chrome or Mozilla Firefox to install the MetaMask browser extension.

1. Visit the official extension store for your browser (the Chrome Web Store or Firefox Add-ons) and search for MetaMask, making sure the extension is published by Consensys to ensure it is the legitimate version.
2. After installing the extension, open MetaMask from the browser toolbar and follow the setup process to create a new wallet account. During this process, you will be asked to create a secure password and will be provided with a secret recovery phrase, which must be stored safely because it allows you to recover access to your wallet and funds if needed.

</div>



</div>
